# Tier 1 config — 1× RTX 3090, Gemma 4 E4B. MVP validation target.
# See docs/02-hardware.md §Tier 1 and docs/04-implementation.md §Phase 1.

run_id: tier1_e4b_phase1
seed: 42
tier: 1
max_generations: 200

n_solver_branches: 4
n_proposer_variants: 1

model:
  # Set SI_CACHE in your env; see docs/04-implementation.md §0.4.
  base_model_path: ${SI_CACHE}/gemma-4-E4B-hf
  dtype: bfloat16
  gpu_memory_utilization: 0.85
  use_cache: true   # non-negotiable: Gemma 4 bug when false (see 01-sources)
  max_model_len: 8192
  trust_remote_code: false

proposer:
  mc_rollouts: 8
  temperature: 0.8
  top_p: 0.95
  max_new_tokens: 1024
  proposals_per_generation: 48   # Tier 1 budget: ~15/min
  enable_thinking: false
  seed_mix_ratio: 0.1

solver:
  temperature: 0.5
  top_p: 0.95
  max_new_tokens: 2048
  enable_thinking: true
  n_rollouts_per_task: 1

verifier:
  backend: sandboxfusion
  endpoint: http://localhost:8765
  timeout_s: 5
  memory_mb: 512
  cpu_count: 1
  network_enabled: false

lora:
  rank: 16    # smaller at Tier 1 to fit 4 branches
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

grpo:
  lr: 1.0e-6
  kl_coef: 1.0e-3
  kl_type: low_var_kl
  clip_range: 0.2
  group_size: 8
  ppo_mini_batch_size: 16   # small for Tier 1
  grad_clip_norm: 1.0

elo:
  k: 32.0
  default_rating: 1500.0
  matches_per_generation_multiplier: 3.0
  replacement_quartile_size: 0.25
  mutation_sigma: 0.001

# Islands disabled at Tier 1 — population too small. Re-enable at Tier 2.
islands:
  enabled: false
  n_islands: 1
  migration_every: 5
  migrant_experience_priority: 2.0
  migrant_priority_decay_gens: 1

anchor:
  primary: humaneval_plus
  secondary: null
  meta: mbpp_plus
  anchor_every: 10
  reversion_tolerance: 0.02
  reversion_strict_after_gen: 50

# In-Place TTT disabled at Tier 1. Phase 4 only.
ttt:
  enabled: false
  target_module_name: mlp.down_proj
  lr: 1.0e-4
  chunk_tokens: 256
  reset_between_problems: true
